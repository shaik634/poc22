- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script_stop: true
    timeout: 120s
    script: |
      cd ${{ secrets.APP_PATH }}
      pm2 stop nodeapp || true
      rm -rf *
      git clone https://github.com/shaik634/poc22.git .
      npm install
      pm2 start app.js --name nodeapp
      pm2 save
